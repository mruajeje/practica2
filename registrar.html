<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Título de tu Web</title>
    
    <link rel="stylesheet" href="./css/styles.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <div class="logo-container">
                <a href="index.html" class="logo-link">
                    <img src="./img/logo.png" alt="Logotipo Web" class="logo-img">
                </a>
                <div class="site-info">
                    <h1 class="site-title">PlanB</h1>
                </div>
            </div>

            <label for="menu-toggle" class="menu-button">
                <i class="fa-solid fa-bars"></i>
            </label>
        </div>

        <input type="checkbox" id="menu-toggle" class="menu-checkbox">

        <nav class="main-nav">
            <ul>
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a></li>
                <li><a href="buscar.html"><i class="fa-solid fa-magnifying-glass"></i> Buscar</a></li>
                <li><a href="login.html"><i class="fa-solid fa-user"></i> Login</a></li>
                <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
                <li><a href="registrar.html"><i class="fa-solid fa-user-plus"></i> Crear cuenta</a></li>
                <li><a href="nueva.html"><i class="fa-solid fa-plus"></i> Nueva</a></li>
            </ul>
        </nav>
    </header>

    <main class="register-page">
        <div class="form-container">
            <h2>Crear cuenta</h2>
            <p>Únete a PlanB y empieza a proponer actividades.</p>

            <form action="#" method="post" class="auth-form">
                <div class="form-group">
                    <label for="username">Usuario *</label>
                    <input type="text" id="username" name="username" 
                        required autofocus
                        minlength="4" maxlength="20"
                        pattern="^[a-zA-Z][a-zA-Z0-9]{3,19}$"
                        title="De 4 a 20 caracteres, solo letras y números. No puede empezar por un número."
                        placeholder="Nombre de usuario">
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required placeholder="Correo electrónico">
                </div>

                <div class="form-group password-wrapper">
                    <label for="password">Contraseña *</label>
                    <div class="input-with-btn">
                        <input type="password" id="password" name="password" 
                            required 
                            minlength="5" maxlength="20"
                            pattern="[a-zA-Z0-9_\-\.]+"
                            title="De 5 a 20 caracteres. Solo letras, números y los caracteres _ - ."
                            placeholder="••••••••">
                        <button type="button" class="toggle-password" title="Mostrar/Ocultar">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group password-wrapper">
                    <label for="password-confirm">Confirmar Contraseña</label>
                    <div class="input-with-btn">
                        <input type="password" id="password-confirm" name="password-confirm" placeholder="••••••••">
                        <button type="button" class="toggle-password" title="Mostrar/Ocultar">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group profile-photo-section">
                    <label>Foto de usuario</label>
                    <div class="photo-preview-container">
                        <img src="./img/usuarioRegistro.png" alt="Previsualización" id="photo-preview" class="user-img-preview">
                    </div>
                    <div class="photo-actions">
                        <input type="file" id="user-photo" name="user-photo" accept="image/*" hidden>
                        <button type="button" class="btn-photo" onclick="document.getElementById('user-photo').click()">
                            <i class="fa-solid fa-upload"></i> Cargar
                        </button>
                        <button type="button" class="btn-photo btn-remove" id="remove-photo">
                            <i class="fa-solid fa-trash"></i> Eliminar
                        </button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="reset" class="btn-secondary">Limpiar</button>
                    <button type="submit" class="btn-primary">Registrar</button>
                </div>
            </form>

            <div class="form-footer">
                ¿Ya tienes cuenta? <a href="login.html" class="link-highlight">Inicia sesión aquí</a>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 PlanB. Todos los derechos reservados.</p>
        <p>
            <a href="acerca.html">Información de contacto y Acerca de</a>
        </p>
    </footer>

</body>
</html>
