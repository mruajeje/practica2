<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PlanB - Buscar</title>

    <link rel="stylesheet" href="./css/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <header class="main-header">
        <div class="header-top">
            <div class="logo-container">
                <a href="index.html" class="logo-link">
                    <img src="./img/logo.png" alt="Logotipo Web" class="logo-img">
                </a>
                <div class="site-info">
                    <h1 class="site-title">PlanB</h1>
                    <h2 class="site-subtitle">Nuevas actividades te esperan</h2>
                </div>
            </div>

            <label for="menu-toggle" class="menu-button">
                <i class="fa-solid fa-bars"></i>
            </label>
        </div>

        <input type="checkbox" id="menu-toggle" class="menu-checkbox">

        <nav class="main-nav">
            <ul>
                <li><a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a></li>
                <li><a href="buscar.html"><i class="fa-solid fa-magnifying-glass"></i> Buscar</a></li>
                <li><a href="login.html"><i class="fa-solid fa-user"></i> Login</a></li>
                <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
                <li><a href="registrar.html"><i class="fa-solid fa-user-plus"></i> Crear cuenta</a></li>
                <li><a href="nueva.html"><i class="fa-solid fa-plus"></i> Nueva</a></li>
            </ul>
        </nav>
    </header>

    <main class="search-page">
        <section class="search-container">
            <h2>Buscar Actividades</h2>

            <form id="form-busqueda" class="search-form">
                <div class="form-group full-width">
                    <label for="filtro-texto">Palabra clave:</label>
                    <input type="text" id="filtro-texto" name="t" placeholder="Ej: Senderismo, Playa, Taller...">
                </div>

                <div class="filters-row">
                    <div class="form-group">
                        <label for="filtro-categoria">Categoría:</label>
                        <input type="text" id="filtro-categoria" name="c" list="sugerencias-categorias"
                            placeholder="Selecciona...">
                        <datalist id="sugerencias-categorias">
                        </datalist>
                    </div>

                    <div class="form-group">
                        <label for="filtro-autor">Creado por:</label>
                        <input type="text" id="filtro-autor" name="a" placeholder="Nombre de usuario">
                    </div>

                    <div class="form-group">
                        <label for="filtro-lugar">Ubicación:</label>
                        <input type="text" id="filtro-lugar" name="l" placeholder="Ciudad o zona">
                    </div>
                </div>

                <fieldset class="rating-range">
                    <legend>Valoración (estrellas):</legend>
                    <div class="range-inputs">
                        <label>Desde: <input type="number" id="filtro-val-min" name="vd" min="1" max="5"
                                value="1"></label>
                        <label>Hasta: <input type="number" id="filtro-val-max" name="vh" min="1" max="5"
                                value="5"></label>
                    </div>
                </fieldset>

                <button type="submit" class="btn-primary search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i> Buscar
                </button>
            </form>
        </section>

        <hr class="divider">

        <section class="results-section">
            <h3 id="mensaje-resultados">Resultados de búsqueda</h3>
            <div class="activities-grid" id="contenedor-actividades">
            </div>
            <div class="load-more-container" style="text-align: center; margin-top: 20px;">
                <p id="info-paginacion" style="margin-bottom: 10px; font-weight: bold;"></p>
                <button id="btn-mostrar-mas" class="btn-primary" type="button" style="display: none;">Mostrar más</button>
            </div>
    </main>
        </section>

    <footer class="main-footer">
        <p>&copy; 2026 PlanB. Todos los derechos reservados.</p>
        <p>
            <a href="acerca.html">Información de contacto y Acerca de</a>
        </p>
    </footer>
    <script src="./js/buscar.js?v=999"></script>
    <script src="./js/logout.js"></script>
</body>

</html>
